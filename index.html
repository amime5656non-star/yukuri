<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆくり</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: #f8f6f2;
  color: #2f2f2f;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 40px 22px;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.section {
  margin-bottom: 25px;
}

label {
  font-size: 13px;
  color: #777;
}

select, input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ddd;
  padding: 10px;
  background: transparent;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
}

.record {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
  font-size: 13px;
}

.balance {
  margin: 20px 0;
}
</style>
</head>

<body>
<div class="container">

<h1>ゆくり</h1>

<div class="section">
<label>場</label>
<select id="place">
<option>寝室 北</option>
<option>寝室 南</option>
<option>南西の部屋</option>
<option>アトリエ</option>
<option>車</option>
</select>
</div>

<div class="section">
<label>体調（複数選択）</label>
<select id="health" multiple>
<option value="水">冷え</option>
<option value="水">腰痛</option>
<option value="火">寝不足</option>
<option value="木">肩こり</option>
<option value="火">頭痛</option>
<option value="土">だるさ</option>
</select>
</div>

<div class="section">
<label>石</label>
<select id="stone" multiple>
<option>アメジスト</option>
<option>セレナイト</option>
<option>チャロアイト</option>
<option>ラピスラズリ</option>
<option>フローライト</option>
</select>
</div>

<div class="section">
<label>香り</label>
<select id="scent" multiple>
<option>ひのき</option>
<option>ラベンダー</option>
<option>ベチバー</option>
<option>ミント</option>
</select>
</div>

<div class="section">
<label>お茶</label>
<input id="tea">
</div>

<button onclick="save()">記す</button>

<div class="balance" id="balance"></div>

<div id="list"></div>

</div>

<script>

function save(){
  const selected = Array.from(health.selectedOptions).map(o=>o.value);

  let count = {木:0,火:0,土:0,金:0,水:0};
  selected.forEach(v=>count[v]++);

  const data = {
    place: place.value,
    health: selected,
    stone: Array.from(stone.selectedOptions).map(o=>o.value),
    scent: Array.from(scent.selectedOptions).map(o=>o.value),
    tea: tea.value,
    balance: count
  };

  let records = JSON.parse(localStorage.getItem('r')||'[]');
  records.unshift(data);
  localStorage.setItem('r', JSON.stringify(records));

  show();
  calc();
}

function show(){
  let records = JSON.parse(localStorage.getItem('r')||'[]');
  list.innerHTML="";

  records.forEach(r=>{
    let d=document.createElement('div');
    d.className="record";
    d.innerHTML=`${r.place}｜体調:${r.health.join()}｜石:${r.stone.join()}｜香り:${r.scent.join()}`;
    list.appendChild(d);
  });
}

function calc(){
  let records = JSON.parse(localStorage.getItem('r')||'[]');
  let total = {木:0,火:0,土:0,金:0,水:0};

  records.forEach(r=>{
    for(let k in r.balance){
      total[k]+=r.balance[k];
    }
  });

  balance.innerText =
   "五行バランス → 木:"+total.木+" 火:"+total.火+" 土:"+total.土+" 金:"+total.金+" 水:"+total.水;

  message(total);
}

function message(total){
  let max = Object.keys(total).reduce((a,b)=> total[a]>total[b]?a:b);

  let msg = "";

  if(max=="水") msg="あたためて、安心する時間を";
  if(max=="火") msg="静かに、落ち着きを取り戻す日";
  if(max=="木") msg="流れをよくして、巡らせる";
  if(max=="土") msg="ゆっくり整えて、満たす";
  if(max=="金") msg="手放して、軽くする";

  document.getElementById("balance").innerHTML += "<br><br>🌿 "+msg;
}

show();
calc();

</body>
</html>

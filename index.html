<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ゆくり</title>
</head>
<body>

  <h1>ゆくり</h1>

  <h2>記録</h2>

  <label>体調：</label><br>
  <input type="text" id="health"><br><br>

  <label>五行：</label><br>
  <input type="text" id="fiveElements"><br><br>

  <label>石：</label><br>
  <input type="text" id="stone"><br><br>

  <label>香り：</label><br>
  <input type="text" id="scent"><br><br>

  <button onclick="saveData()">保存</button>

  <h2>記録一覧</h2>
  <ul id="list"></ul>

  <script>
    function saveData() {
      const data = {
        health: document.getElementById('health').value,
        fiveElements: document.getElementById('fiveElements').value,
        stone: document.getElementById('stone').value,
        scent: document.getElementById('scent').value,
        time: new Date().toLocaleString()
      };

      let records = JSON.parse(localStorage.getItem('records') || '[]');
      records.push(data);
      localStorage.setItem('records', JSON.stringify(records));

      displayData();
    }

    function displayData() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      let records = JSON.parse(localStorage.getItem('records') || '[]');

      records.forEach(r => {
        const li = document.createElement('li');
        li.textContent = `${r.time}｜体調:${r.health}｜五行:${r.fiveElements}｜石:${r.stone}｜香り:${r.scent}`;
        list.appendChild(li);
      });
    }

    displayData();
  </script>

</body>
</html>

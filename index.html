<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆくり</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: #f8f6f2;
  color: #2f2f2f;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 40px 22px;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.section {
  margin-bottom: 25px;
}

label {
  font-size: 13px;
  color: #777;
}

input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #ddd;
  padding: 10px;
  background: transparent;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
}

.record {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
  font-size: 13px;
}

.suggest {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
}

.balance {
  margin: 20px 0;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="container">

<h1>ゆくり</h1>

<div class="section">
<label>場</label>
<select id="place" onchange="suggest()">
<option>寝室 北</option>
<option>寝室 南</option>
<option>南西の部屋</option>
<option>アトリエ</option>
<option>車</option>
</select>
<div class="suggest" id="suggest"></div>
</div>

<div class="section">
<label>体調</label>
<input id="health">
</div>

<div class="section">
<label>五行</label>
<select id="five">
<option>木</option>
<option>火</option>
<option>土</option>
<option>金</option>
<option>水</option>
</select>
</div>

<div class="section">
<label>石</label>
<select id="stone" multiple>
<option>アメジスト</option>
<option>セレナイト</option>
<option>チャロアイト</option>
<option>ラピスラズリ</option>
<option>フローライト</option>
</select>
</div>

<div class="section">
<label>香り</label>
<select id="scent" multiple>
<option>ひのき</option>
<option>ラベンダー</option>
<option>ベチバー</option>
<option>ミント</option>
</select>
</div>

<div class="section">
<label>お茶</label>
<input id="tea">
</div>

<button onclick="save()">記す</button>

<div class="balance" id="balance"></div>

<div id="list"></div>

</div>

<script>

// 🌿 場ごとのおすすめ
function suggest(){
  const place = document.getElementById('place').value;
  let text = "";

  if(place==="寝室 北"){
    text = "静けさ：アメジスト / セレナイト";
  }
  if(place==="寝室 南"){
    text = "やわらかさ：チャロアイト";
  }
  if(place==="南西の部屋"){
    text = "安定：フローライト";
  }
  if(place==="アトリエ"){
    text = "創造：ラピスラズリ";
  }
  if(place==="車"){
    text = "守り：チャロアイト";
  }

  document.getElementById('suggest').innerText = text;
}

// 🌿 保存
function save(){
  const data = {
    place: place.value,
    health: health.value,
    five: five.value,
    stone: Array.from(stone.selectedOptions).map(o=>o.value),
    scent: Array.from(scent.selectedOptions).map(o=>o.value),
    tea: tea.value
  };

  let records = JSON.parse(localStorage.getItem('r')||'[]');
  records.unshift(data);
  localStorage.setItem('r', JSON.stringify(records));

  show();
  calc();
}

// 🌿 表示
function show(){
  let records = JSON.parse(localStorage.getItem('r')||'[]');
  list.innerHTML="";

  records.forEach(r=>{
    let d=document.createElement('div');
    d.className="record";
    d.innerHTML=`${r.place}｜${r.five}｜石:${r.stone.join()}｜香り:${r.scent.join()}`;
    list.appendChild(d);
  });
}

// 🌿 五行バランス
function calc(){
  let records = JSON.parse(localStorage.getItem('r')||'[]');
  let count = {木:0,火:0,土:0,金:0,水:0};

  records.forEach(r=>{
    count[r.five]++;
  });

  balance.innerText = 
    "木:"+count.木+" 火:"+count.火+" 土:"+count.土+" 金:"+count.金+" 水:"+count.水;
}

suggest();
show();
calc();

</script>

</body>
  </html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆくり</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Mincho ProN",serif;
  background:#f8f6f2;
  color:#2f2f2f;
}
.container{
  max-width:520px;
  margin:auto;
  padding:30px;
}
.section{margin-bottom:25px;}
label{font-size:13px;color:#777;}
select,input{
  width:100%;
  border:none;
  border-bottom:1px solid #ddd;
  padding:10px;
  background:transparent;
}
.fixed{
  font-size:12px;
  color:#666;
  line-height:1.6;
  margin-top:8px;
}
.record{
  border-bottom:1px solid #eee;
  padding:10px 0;
  font-size:12px;
}
</style>
</head>

<body>
<div class="container">

<h1>ゆくり</h1>

<!-- 🌿 場 -->
<div class="section">
<label>場</label>
<select id="place" onchange="showSpace()">
<option>寝室 北枕元</option>
<option>寝室 南祭壇</option>
<option>南西の部屋 入口</option>
<option>南西の部屋 マントル</option>
<option>アトリエ</option>
<option>車</option>
</select>

<div class="fixed" id="space"></div>
</div>

<!-- 🌿 体調 -->
<div class="section">
<label>体調</label>
<select id="health" multiple>
<option value="水">冷え</option>
<option value="水">腰痛</option>
<option value="火">寝不足</option>
<option value="木">肩こり</option>
<option value="火">頭痛</option>
<option value="土">だるさ</option>
</select>
</div>

<!-- 🌿 指輪 -->
<div class="section">
<label>指輪</label>
<select id="ring" multiple>
<option>ペリドット</option>
<option>レインボームーンストーン</option>
<option>ウォーターオパール</option>
<option>スタールビー</option>
<option>フラワールチルクォーツ</option>
<option>ブルートパーズ</option>
<option>シルバーリング</option>
</select>
</div>

<!-- 🌿 持ち歩き石 -->
<div class="section">
<label>持ち歩き</label>
<select id="carry" multiple>
<option>タイガーアイ</option>
<option>ソーダライト</option>
<option>フローライト</option>
<option>アメジスト</option>
<option>スギライト</option>
<option>水晶</option>
<option>ブルーレースアゲート</option>
<option>シトリン</option>
<option>ラピスラズリ</option>
<option>ラブラドライト</option>
<option>レッドジャスパー</option>
<option>アマゾナイト</option>
</select>
</div>

<!-- 🌿 香り追加 -->
<div class="section">
<label>香り（追加）</label>
<input id="scent">
</div>

<button onclick="save()">記す</button>

<div id="balance"></div>
<div id="list"></div>

</div>

<script>

// 🌿 空間表示
function showSpace(){
  let p = place.value;
  let text="";

  if(p==="寝室 北枕元"){
    text="香りなし｜アゲート2・緑柱石・セレナイト・アメジスト";
  }
  if(p==="寝室 南祭壇"){
    text="パロサント｜オレンジカルセドニー・ムーンストーン・ピンクサファイア・翡翠・チャロアイト";
  }
  if(p==="南西の部屋 入口"){
    text="ひのき＋ラベンダー｜水晶";
  }
  if(p==="南西の部屋 マントル"){
    text="ベチバー｜ラベンダー翡翠・グリーンアゲート";
  }
  if(p==="アトリエ"){
    text="砂漠のバラ・方解石・石英・ラピス・フローライト｜ライアー・ラタン椅子";
  }
  if(p==="車"){
    text="ひのき＋オレンジ｜チャロアイト";
  }

  space.innerText=text;
}

// 🌿 保存
function save(){
  let selected = Array.from(health.selectedOptions).map(o=>o.value);
  let count={木:0,火:0,土:0,金:0,水:0};
  selected.forEach(v=>count[v]++);

  const data={
    place:place.value,
    ring:Array.from(ring.selectedOptions).map(o=>o.value),
    carry:Array.from(carry.selectedOptions).map(o=>o.value),
    scent:scent.value,
    balance:count
  };

  let r=JSON.parse(localStorage.getItem('r')||'[]');
  r.unshift(data);
  localStorage.setItem('r',JSON.stringify(r));

  show();
  calc();
}

// 🌿 表示
function show(){
  let r=JSON.parse(localStorage.getItem('r')||'[]');
  list.innerHTML="";
  r.forEach(x=>{
    let d=document.createElement('div');
    d.className="record";
    d.innerHTML=`${x.place}｜指輪:${x.ring.join()}｜持:${x.carry.join()}`;
    list.appendChild(d);
  });
}

// 🌿 五行
function calc(){
  let r=JSON.parse(localStorage.getItem('r')||'[]');
  let t={木:0,火:0,土:0,金:0,水:0};

  r.forEach(x=>{
    for(let k in x.balance){t[k]+=x.balance[k]}
  });

  balance.innerText=`木:${t.木} 火:${t.火} 土:${t.土} 金:${t.金} 水:${t.水}`;
}

showSpace();
show();
calc();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆくり</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: #f8f6f2;
  color: #2f2f2f;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 40px 22px;
}

h1 {
  text-align: center;
  font-weight: normal;
  margin-bottom: 50px;
  letter-spacing: 0.1em;
}

.section {
  margin-bottom: 28px;
}

label {
  font-size: 13px;
  color: #777;
}

input, select {
  width: 100%;
  border: none;
  border-bottom: 1px solid #e5e2dc;
  padding: 12px 5px;
  font-size: 15px;
  background: transparent;
}

button {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid #e5e2dc;
  margin-top: 30px;
  font-size: 14px;
}

.record {
  font-size: 13px;
  color: #444;
  padding: 14px 0;
  border-bottom: 1px solid #eee9e2;
}
</style>

</head>
<body>

<div class="container">

<h1>ゆくり</h1>

<div class="section">
<label>場</label>
<select id="place">
<option>家（居間）</option>
<option>寝室 北</option>
<option>寝室 南</option>
<option>南西の部屋</option>
<option>アトリエ</option>
<option>車</option>
<option>外出</option>
</select>
</div>

<div class="section">
<label>体調</label>
<input type="text" id="health">
</div>

<div class="section">
<label>五行</label>
<select id="fiveElements">
<option>木</option>
<option>火</option>
<option>土</option>
<option>金</option>
<option>水</option>
</select>
</div>

<div class="section">
<label>石</label>
<select id="stone">
<option></option>
<option>アゲート</option>
<option>グリーンアゲート</option>
<option>アメジスト</option>
<option>セレナイト</option>
<option>オレンジカルセドニー</option>
<option>ピンクサファイア</option>
<option>レインボームーンストーン</option>
<option>チャロアイト</option>
<option>ラベンダー翡翠</option>
<option>フローライト</option>
<option>金色方解石</option>
<option>ラピスラズリ</option>
<option>砂漠のバラ</option>
<option>タイガーアイ</option>
<option>ソーダライト</option>
<option>レッドジャスパー</option>
<option>ブルーレースアゲート</option>
<option>シトリン</option>
<option>スギライト</option>
<option>ペリドット</option>
<option>ウォーターオパール</option>
<option>フラワールチルクォーツ</option>
<option>スタールビー</option>
<option>ブルートパーズ</option>
<option>インペリアルトパーズ</option>
<option>クンツァイト</option>
<option>ピンクトルマリン</option>
</select>
</div>

<div class="section">
<label>香り</label>
<select id="scent">
<option></option>
<option>ひのき</option>
<option>スウィートオレンジ</option>
<option>ラベンダー</option>
<option>ベチバー</option>
<option>ミント</option>
<option>ジンジャー</option>
<option>パチュリ</option>
<option>カフィアライム</option>
<option>ティートゥリー</option>
</select>
</div>

<div class="section">
<label>お茶</label>
<input type="text" id="tea">
</div>

<button onclick="saveData()">記す</button>

<div class="section">
<div id="list"></div>
</div>

</div>

<script>
function saveData() {
  const data = {
    place: document.getElementById('place').value,
    health: document.getElementById('health').value,
    fiveElements: document.getElementById('fiveElements').value,
    stone: document.getElementById('stone').value,
    scent: document.getElementById('scent').value,
    tea: document.getElementById('tea').value,
    time: new Date().toLocaleString()
  };

  let records = JSON.parse(localStorage.getItem('records') || '[]');
  records.unshift(data);
  localStorage.setItem('records', JSON.stringify(records));

  displayData();
}

function displayData() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let records = JSON.parse(localStorage.getItem('records') || '[]');

  records.forEach(r => {
    const div = document.createElement('div');
    div.className = 'record';
    div.innerHTML = `
      <div>${r.time}</div>
      <div>場：${r.place}</div>
      <div>体調：${r.health}</div>
      <div>五行：${r.fiveElements}</div>
      <div>石：${r.stone}</div>
      <div>香り：${r.scent}</div>
      <div>お茶：${r.tea}</div>
    `;
    list.appendChild(div);
  });
}

displayData();
</script>

</body>
  </html>
